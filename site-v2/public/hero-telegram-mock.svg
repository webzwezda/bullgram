  <text x="675" y="612" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="end">2 490 ₽</text>
  <text x="490" y="632" fill="#64748B" font-family="Arial, sans-serif" font-size="12">3 месяца</text>
  <text x="675" y="632" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="end">5 990 ₽</text>

  <rect width="314" height="44" x="443" y="668" fill="#FFFFFF" rx="0"/>
