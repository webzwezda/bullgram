  <rect width="270" height="92" x="465" y="374" fill="#FFFFFF" rx="18"/>
  <circle cx="495" cy="412" r="14" fill="#D8E8F8"/>
  <path d="M489 412h12m-6-6v12" stroke="#2563EB" stroke-linecap="round" stroke-width="2.5"/>
  <text x="525" y="404" fill="#0F172A" font-family="Arial, sans-serif" font-size="15" font-weight="700">Новый платеж подтвержден</text>
