<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bullgram</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: rgba(255, 255, 255, 0.92);
        --line: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(13, 148, 136, 0.12), transparent 34%),
          radial-gradient(circle at bottom right, rgba(14, 116, 144, 0.1), transparent 32%),
          var(--bg);
      }

      .card {
        width: min(100%, 720px);
        padding: 40px 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(32px, 6vw, 54px);
        line-height: 0.98;
      }

      p {
        margin: 0;
        max-width: 52ch;
        font-size: 18px;
        line-height: 1.65;
        color: var(--muted);
      }

      .note {
        margin-top: 28px;
        font-size: 14px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Bullgram</div>
      <h1>Ведутся работы</h1>
      <p>
        Сайт временно недоступен. Мы обновляем контур и скоро вернёмся.
      </p>
      <div class="note">Попробуй зайти позже.</div>
    </main>
  </body>
</html>
