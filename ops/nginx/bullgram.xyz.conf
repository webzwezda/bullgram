# Config for new domain bullgram.xyz
server {
    listen 80;
    server_name bullgram.xyz www.bullgram.xyz;
    return 301 https://bullgram.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bullgram.xyz www.bullgram.xyz;

    ssl_certificate /etc/letsencrypt/live/bullgram.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bullgram.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    index index.html;

    # Gzip on-the-fly для JS/CSS/JSON/SVG — даёт ~4x сжатие бандлов
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rest/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /realtime/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /app/assets/ {
        alias /var/www/bullrun-admin-v2/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /assets/ {
        alias /var/www/bullrun-site-v2/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /app/telegram-web/ {
        alias /var/www/bullrun-telegram-web/;
        try_files $uri /app/telegram-web/index.html;
        add_header Cache-Control "no-cache";
    }

    location = /app {
        return 301 /app/;
    }

    location /app/ {
        alias /var/www/bullrun-admin-v2/;
        try_files $uri /app/index.html;
        add_header Cache-Control "no-cache";
    }

    location = /tonconnect-manifest.json {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache";
        default_type application/json;
    }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\n\nSitemap: https://bullgram.xyz/blog/sitemap.xml\nSitemap: https://bullgram.xyz/courses/sitemap.xml\n";
    }

    location = /sitemap.xml {
        return 301 /blog/sitemap.xml;
    }

    location = /blog {
        return 301 /blog/;
    }

    location ^~ /blog/ {
        alias /var/www/bullrun-blog/;
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /courses {
        return 301 /courses/;
    }

    location ^~ /courses/ {
        alias /var/www/bullrun-courses/;
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /secretvpn { return 404; }
    location /portainer/ { return 404; }
    location /umami/ { return 404; }
    location /freq/ { return 404; }
    location /studio/ { return 404; }
    location = /myvault { return 404; }
    location /myvault/ { return 404; }
    location = /mymail { return 404; }
    location /mymail/ { return 404; }
    location /snappymail/ { return 404; }
    location /asf/ { return 404; }

    location / {
        root /var/www/bullrun-site-v2;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# 301 Redirect from bullrun.ru to bullgram.xyz
server {
    listen 80;
    listen 443 ssl http2;
    server_name bullrun.ru www.bullrun.ru;

    ssl_certificate /etc/letsencrypt/live/bullrun.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bullrun.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://bullgram.xyz$request_uri;
}
