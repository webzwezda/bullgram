server {
    listen 80;
    server_name bullrun.ru www.bullrun.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bullrun.ru www.bullrun.ru;

    ssl_certificate /etc/letsencrypt/live/bullrun.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bullrun.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    location /auth/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rest/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /realtime/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /app/assets/ {
        alias /var/www/bullrun-admin-v2/assets/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /app/ {
        alias /var/www/bullrun-admin-v2/;
        try_files $uri $uri/ /app/index.html;
    }

    location = /admin {
        return 302 /app/;
    }

    location = /admin/ {
        return 302 /app/;
    }

    location = /admin/index {
        return 302 /app/;
    }

    location = /admin/index/ {
        return 302 /app/;
    }

    location /admin/ {
        return 410;
    }

    location / {
        root /var/www/bullrun-site-v2;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
